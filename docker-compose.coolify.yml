services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DB:-eve_nexum}
      POSTGRES_USER: ${PG_USER:-nexum}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-nexum} -d ${PG_DB:-eve_nexum}"]
      interval: 5s
      timeout: 5s
      retries: 10

  importer:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file: .env
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      NODE_ENV: production
    command: ["node", "dist/scripts/setup-db.js"]
    volumes:
      - sde_cache:/app/.sde-cache
    depends_on:
      postgres:
        condition: service_healthy
    exclude_from_hc: true

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      NODE_ENV: production
      PORT: ${PORT:-3001}
    volumes:
      - sde_cache:/app/.sde-cache
    depends_on:
      postgres:
        condition: service_healthy
      importer:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-3001}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_GTM_ID: ${VITE_GTM_ID:-}
    restart: unless-stopped
    environment:
      API_PORT: ${PORT:-3001}
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  sde_cache: