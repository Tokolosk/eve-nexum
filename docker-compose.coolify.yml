services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DB:-eve_nexum}
      POSTGRES_USER: ${PG_USER:-nexum}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-nexum} -d ${PG_DB:-eve_nexum}"]
      interval: 5s
      timeout: 5s
      retries: 10

  importer:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: "no"
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: ${PG_DB:-eve_nexum}
      PG_USER: ${PG_USER:-nexum}
      PG_PASSWORD: ${PG_PASSWORD:-}

      NODE_ENV: production
      SESSION_SECRET: ${SESSION_SECRET:-}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-}

      EVE_CLIENT_ID: ${EVE_CLIENT_ID:-}
      EVE_CLIENT_SECRET: ${EVE_CLIENT_SECRET:-}
      EVE_CALLBACK_URL: ${EVE_CALLBACK_URL:-}
      FRONTEND_URL: ${FRONTEND_URL:-}

      CORP_ID: ${CORP_ID:-}
      ADMIN_CHAR_ID: ${ADMIN_CHAR_ID:-}
      CORP_MAP_SHARED: ${CORP_MAP_SHARED:-false}
      CORP_MAP_TIME: ${CORP_MAP_TIME:-30}
      MAX_USER_MAPS: ${MAX_USER_MAPS:-5}
      MAX_CORP_MAPS: ${MAX_CORP_MAPS:-5}

      LAZY_WH_SWEEP_MINUTES: ${LAZY_WH_SWEEP_MINUTES:-15}
      LOCATION_POLL_MINUTES: ${LOCATION_POLL_MINUTES:-0}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      NEXUM_TELEMETRY: ${NEXUM_TELEMETRY:-0}
    command: ["node", "dist/scripts/setup-db.js"]
    volumes:
      - sde_cache:/app/.sde-cache
    depends_on:
      postgres:
        condition: service_healthy
    exclude_from_hc: true

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: ${PG_DB:-eve_nexum}
      PG_USER: ${PG_USER:-nexum}
      PG_PASSWORD: ${PG_PASSWORD:-}

      PORT: ${PORT:-3001}
      NODE_ENV: production
      SESSION_SECRET: ${SESSION_SECRET:-}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-}

      EVE_CLIENT_ID: ${EVE_CLIENT_ID:-}
      EVE_CLIENT_SECRET: ${EVE_CLIENT_SECRET:-}
      EVE_CALLBACK_URL: ${EVE_CALLBACK_URL:-}
      FRONTEND_URL: ${FRONTEND_URL:-}

      CORP_ID: ${CORP_ID:-}
      ADMIN_CHAR_ID: ${ADMIN_CHAR_ID:-}
      CORP_MAP_SHARED: ${CORP_MAP_SHARED:-false}
      CORP_MAP_TIME: ${CORP_MAP_TIME:-30}
      MAX_USER_MAPS: ${MAX_USER_MAPS:-5}
      MAX_CORP_MAPS: ${MAX_CORP_MAPS:-5}

      LAZY_WH_SWEEP_MINUTES: ${LAZY_WH_SWEEP_MINUTES:-15}
      LOCATION_POLL_MINUTES: ${LOCATION_POLL_MINUTES:-0}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      NEXUM_TELEMETRY: ${NEXUM_TELEMETRY:-0}
    volumes:
      - sde_cache:/app/.sde-cache
    depends_on:
      postgres:
        condition: service_healthy
      importer:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-3001}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_GTM_ID: ${VITE_GTM_ID:-}
    restart: unless-stopped
    expose:
      - "80"
    environment:
      API_PORT: ${PORT:-3001}
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  sde_cache:
