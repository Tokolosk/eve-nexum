services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DB:-eve_nexum}
      POSTGRES_USER: ${PG_USER:-nexum}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-nexum} -d ${PG_DB:-eve_nexum}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot job: imports the EVE SDE into Postgres, then exits. Reuses the
  # server image. The import skips itself when the static tables are already
  # populated, so this is safe to run on every `up` (no re-download). Set
  # FORCE_SDE_IMPORT=1 to force a re-import after a new CCP SDE release.
  importer:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file: .env
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      NODE_ENV: production
    command: ["node", "dist/scripts/setup-db.js"]
    volumes:
      # Persist the downloaded SDE zip so re-imports don't re-fetch it.
      - sde_cache:/app/.sde-cache
    depends_on:
      postgres:
        condition: service_healthy

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Inside the Docker network the server reaches Postgres at
      # postgres:5432 regardless of any host-side port remapping the
      # user did via PG_PORT in .env.
      PG_HOST: postgres
      PG_PORT: 5432
      NODE_ENV: production
    ports:
      # Server listens on whatever PORT says. Host port matches so
      # EVE_CALLBACK_URL=http://localhost:${PORT}/auth/callback works.
      - "${PORT:-3001}:${PORT:-3001}"
    volumes:
      # The daily auto-update check spawns the importer in this container; its
      # SDE download lands here rather than bloating the container layer.
      - sde_cache:/app/.sde-cache
    depends_on:
      postgres:
        condition: service_healthy
      importer:
        condition: service_completed_successfully

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # Optional GTM container ID baked into the build. Unset => no analytics
        # (the default for self-hosters). Set VITE_GTM_ID in .env to enable it
        # for your own deployment only.
        VITE_GTM_ID: ${VITE_GTM_ID:-}
    restart: unless-stopped
    environment:
      # Tells nginx which port to proxy /api/* and /auth/* to inside the
      # docker network. Must match the server's PORT — otherwise the
      # proxy returns 502 because nginx is asking a port nobody answers.
      API_PORT: ${PORT:-3001}
    ports:
      # Host-side WEB_PORT (default 80). nginx inside always listens on 80.
      - "${WEB_PORT:-80}:80"
    depends_on:
      - server

volumes:
  postgres_data:
  sde_cache:
